version: "3.9"

services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8080:8080"
    environment:
      # Load from .env file in project root
      OS_AUTH_URL: ${OS_AUTH_URL:-}
      OS_USERNAME: ${OS_USERNAME:-}
      OS_PASSWORD: ${OS_PASSWORD:-}
      OS_PROJECT_NAME: ${OS_PROJECT_NAME:-}
      OS_USER_DOMAIN_NAME: ${OS_USER_DOMAIN_NAME:-Default}
      OS_PROJECT_DOMAIN_NAME: ${OS_PROJECT_DOMAIN_NAME:-Default}
      OS_REGION_NAME: ${OS_REGION_NAME:-RegionOne}
      OS_CLOUD: ${OS_CLOUD:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Mount clouds.yaml if available
      - ${HOME}/.config/openstack:/root/.config/openstack:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
