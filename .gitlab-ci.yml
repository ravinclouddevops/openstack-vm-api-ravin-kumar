###############################################################################
# GitLab CI/CD Pipeline — OpenStack VM API
#
# Stages:
#   lint     → static analysis and formatting checks
#   test     → unit + integration tests with coverage enforcement
#   build    → Docker image build and push
#   deploy   → Rolling deployment to staging / production
###############################################################################

default:
  image: python:3.11-slim
  before_script:
    - pip install --upgrade pip
    - pip install -r requirements.txt -r requirements-dev.txt --quiet

variables:
  PYTHONDONTWRITEBYTECODE: "1"
  PYTHONUNBUFFERED: "1"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.pip-cache"
  IMAGE_NAME: "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA"

cache:
  key: "$CI_COMMIT_REF_SLUG"
  paths:
    - .pip-cache/

stages:
  - lint
  - test
  - build
  - deploy

# ── Lint ──────────────────────────────────────────────────────────────────────

lint:flake8:
  stage: lint
  script:
    - flake8 app/ tests/ --max-line-length=120 --extend-ignore=E203,W503
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

lint:mypy:
  stage: lint
  script:
    - mypy app/ --ignore-missing-imports --python-version=3.11
  allow_failure: true   # warnings don't block merges during ramp-up
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Test ──────────────────────────────────────────────────────────────────────

test:unit:
  stage: test
  script:
    - pytest tests/unit -v --cov=app --cov-report=term-missing --cov-fail-under=80
  coverage: '/TOTAL.*\s+(\d+%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

test:integration:
  stage: test
  script:
    - pytest tests/integration -v
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Build Docker image ────────────────────────────────────────────────────────

build:docker:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build --tag "$IMAGE_NAME" --tag "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$IMAGE_NAME"
    - docker push "$CI_REGISTRY_IMAGE:latest"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── Deploy ────────────────────────────────────────────────────────────────────

deploy:staging:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf -X POST \
        -H "PRIVATE-TOKEN: $DEPLOY_TOKEN" \
        "${DEPLOY_WEBHOOK_URL}?ref=main&variables[IMAGE_TAG]=${CI_COMMIT_SHORT_SHA}&variables[ENV]=staging"
  environment:
    name: staging
    url: https://vm-api-staging.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual

deploy:production:
  stage: deploy
  image: alpine:3.19
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf -X POST \
        -H "PRIVATE-TOKEN: $DEPLOY_TOKEN" \
        "${DEPLOY_WEBHOOK_URL}?ref=main&variables[IMAGE_TAG]=${CI_COMMIT_SHORT_SHA}&variables[ENV]=production"
  environment:
    name: production
    url: https://vm-api.example.com
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  when: manual
  needs:
    - deploy:staging
